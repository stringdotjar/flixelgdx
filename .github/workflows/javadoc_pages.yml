# Builds API documentation from from all modules (excluding flixelgdx-test) and
# publishes to GitHub Pages (gh-pages branch).
name: Deploy Javadoc to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (OpenJ9)
        uses: actions/setup-java@v5
        with:
          distribution: semeru
          java-version: 17
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Javadoc (Core)
        run: ./gradlew :flixelgdx-core:javadoc --no-daemon --warning-mode all
        shell: bash

      - name: Generate Javadoc (LWJGL3)
        run: ./gradlew :flixelgdx-lwjgl3:javadoc --no-daemon --warning-mode all
        shell: bash

      - name: Generate Javadoc (Android)
        run: ./gradlew -PincludeAndroid=true :flixelgdx-android:javaDocReleaseGeneration --no-daemon --warning-mode all
        shell: bash

      - name: Generate Javadoc (iOS)
        run: ./gradlew :flixelgdx-ios:javadoc --no-daemon --warning-mode all
        shell: bash

      - name: Generate Javadoc (Teavm)
        run: ./gradlew :flixelgdx-teavm:javadoc --no-daemon --warning-mode all
        shell: bash

      - name: Generate Javadoc (JVM)
        run: ./gradlew :flixelgdx-jvm:javadoc --no-daemon --warning-mode all
        shell: bash

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./flixelgdx-core/build/docs/javadoc
          force_orphan: true

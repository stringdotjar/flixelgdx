import org.gradle.api.tasks.javadoc.Javadoc
import org.gradle.external.javadoc.JavadocMemberLevel
import org.gradle.external.javadoc.StandardJavadocDocletOptions

java {
  withSourcesJar()
  withJavadocJar()
}

tasks.withType(Javadoc).configureEach { Javadoc t ->
  t.options.encoding = 'UTF-8'
  t.options.charSet = 'UTF-8'
  t.options.docEncoding = 'UTF-8'
  t.options.memberLevel = JavadocMemberLevel.PUBLIC
  t.failOnError = true
  t.modularity.inferModulePath = false
  StandardJavadocDocletOptions opts = t.options as StandardJavadocDocletOptions
  opts.links('https://docs.oracle.com/en/java/javase/17/docs/api/')
  if (JavaVersion.current().isJava9Compatible()) {
    opts.addStringOption('Xdoclint:all,-missing', '-quiet')
  }
}

eclipse.project.name = appName + '-android'

apply plugin: 'com.android.library'

def reflectionProfileRaw = (findProperty("flixelReflectionProfile") ?: "STANDARD").toString().trim().toUpperCase(java.util.Locale.ROOT)
def reflectionProfile = ["SIMPLE", "STANDARD", "ALL"].contains(reflectionProfileRaw) ? reflectionProfileRaw : "STANDARD"
def reflectionExtraPackages = (findProperty("flixelReflectionExtraPackages") ?: "")
  .toString()
  .split(",")
  .collect { it.trim() }
  .findAll { !it.isEmpty() }

def reflectionPackagePrefixes = ["me.stringdotjar.flixelgdx"]
if (reflectionProfile == "STANDARD" || reflectionProfile == "ALL") {
  reflectionPackagePrefixes += "com.badlogic.gdx"
}
if (reflectionProfile == "ALL") {
  reflectionPackagePrefixes += [
    "com.github.tommyettinger",
    "games.rednblack.miniaudio"
  ]
}
reflectionPackagePrefixes += reflectionExtraPackages

def generateReflectionConsumerRules = tasks.register("generateReflectionConsumerRules") {
  def outputDir = layout.buildDirectory.dir("generated/flixel-reflection")
  outputs.dir(outputDir)

  doLast {
    def out = outputDir.get().file("consumer-rules.pro").asFile
    out.parentFile.mkdirs()

    def keepRules = reflectionPackagePrefixes.collect { pkg ->
      "-keep class ${pkg}.** { *; }"
    }.join("\n")

    out.text = """# Auto-generated by flixelgdx-android for reflection profile: ${reflectionProfile}
-keepattributes Signature,InnerClasses,EnclosingMethod,*Annotation*
${keepRules}
"""
  }
}

android {
  namespace "me.stringdotjar.flixelgdx"
  compileSdk 36

  publishing {
    singleVariant("release") {
      withSourcesJar()
      withJavadocJar()
    }
  }

  defaultConfig {
    multiDexEnabled = true
    minSdkVersion 34
    targetSdkVersion 35
    consumerProguardFiles "${buildDir}/generated/flixel-reflection/consumer-rules.pro"
  }
  compileOptions {
    coreLibraryDesugaringEnabled = true
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
}

tasks.matching { it.name == "preBuild" }.configureEach {
  dependsOn generateReflectionConsumerRules
}

repositories {
  // needed for AAPT2, may be needed for other tools
  google()
}

configurations {
  coreLibraryDesugaring
}

dependencies {
  coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'

  api project(':flixelgdx-core')
  api "androidx.multidex:multidex:2.0.1"
  api "games.rednblack.miniaudio:gdx-miniaudio-platform:$miniaudioVersion:natives-armeabi-v7a"
  api "games.rednblack.miniaudio:gdx-miniaudio-platform:$miniaudioVersion:natives-arm64-v8a"
  api "games.rednblack.miniaudio:gdx-miniaudio-platform:$miniaudioVersion:natives-x86"
  api "games.rednblack.miniaudio:gdx-miniaudio-platform:$miniaudioVersion:natives-x86_64"
  api "com.badlogicgames.gdx:gdx-box2d-platform:$gdxVersion:natives-arm64-v8a"
  api "com.badlogicgames.gdx:gdx-box2d-platform:$gdxVersion:natives-armeabi-v7a"
  api "com.badlogicgames.gdx:gdx-box2d-platform:$gdxVersion:natives-x86"
  api "com.badlogicgames.gdx:gdx-box2d-platform:$gdxVersion:natives-x86_64"
  api "com.badlogicgames.gdx:gdx-freetype-platform:$gdxVersion:natives-arm64-v8a"
  api "com.badlogicgames.gdx:gdx-freetype-platform:$gdxVersion:natives-armeabi-v7a"
  api "com.badlogicgames.gdx:gdx-freetype-platform:$gdxVersion:natives-x86"
  api "com.badlogicgames.gdx:gdx-freetype-platform:$gdxVersion:natives-x86_64"
  api "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-arm64-v8a"
  api "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-armeabi-v7a"
  api "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-x86"
  api "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-x86_64"
  api "com.badlogicgames.gdx:gdx-backend-android:$gdxVersion"
}

apply plugin: 'maven-publish'
afterEvaluate {
  publishing {
    publications {
      release(MavenPublication) {
        from components.release
        groupId = project.group
        artifactId = project.name
        version = project.version
        rootProject.configureFlixelMavenPom(delegate)
      }
    }
  }
}
